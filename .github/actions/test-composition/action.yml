name: Test Composition
description: Test the composition in a CI environment
inputs:
  compose_file:
    description: Path to the docker compose file to test
    required: true
  platform:
    description: Target platform for testing (e.g. "linux/amd64", "linux/arm64")
    required: false
    default: "linux/amd64"
  startup_timeout:
    description: Time in seconds to wait for services to start before checking health
    required: false
    default: 0
  connectivity_enpoint:
    description: URL to check for service connectivity (e.g. "http://localhost/auth")
    required: false
    default: "http://localhost/user1/services"
  connectivity_expected_response_code:
    description: Expected HTTP response code for connectivity check (e.g. "200", "302")
    required: false
    default: "200"
  use_env_file:
    description: Whether to use an .env file for environment variables in docker compose (true/false)
    required: false
    default: false
  basic_test:
    description: Whether the test is a basic composition test without traefik (true/false)
    required: false
    default: false
  dex_test:
    description: Whether to run the Dex authentication test (true/false)
    required: false
    default: false
runs:
  using: "composite"
  steps:
    - name: Set up QEMU for multi-platform builds
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build workspace image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ./workspaces
        file: workspaces/Dockerfile.ubuntu.noble.gnome
        build-args: INSTALLATION=minimal
        push: false
        load: true
        platforms: ${{ inputs.platform }}
        tags: workspace:latest
        cache-from: |
          type=gha,scope=${{ inputs.platform }}

    - name: Add Dex hostname to /etc/hosts
      if: ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: echo "127.0.0.1 dex" | sudo tee -a /etc/hosts

    - name: Start services
      shell: bash
      env:
        COMPOSE_FILE: ${{ inputs.compose_file }}
        USE_ENV_FILE: ${{ inputs.use_env_file }}
        STARTUP_TIMEOUT: ${{ inputs.startup_timeout }}
      run: |
        if [ "$USE_ENV_FILE" = "true" ]; then
          ENV_FILE_ARG="--env-file workspaces/test/dtaas/config/.env"
        else
          ENV_FILE_ARG=""
        fi
        docker compose -f $COMPOSE_FILE $ENV_FILE_ARG up -d
        sleep $STARTUP_TIMEOUT

    - name: Check service health
      uses: ./.github/actions/check-service-health
      with:
        compose_file: ${{ inputs.compose_file }}
        use_env_file: ${{ inputs.use_env_file }}

    - name: Test service endpoint
      if: ${{ inputs.dex_test == 'false' }}
      uses: ./.github/actions/check-connectivity
      with:
        url: ${{ inputs.connectivity_endpoint }}
        expected_response_code: ${{ inputs.connectivity_expected_response_code }}
    
    - name: Verify auth is enforced (expect redirect, not 200)
      if: ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: |
        echo "Verifying that unauthenticated requests are redirected..."
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          --max-redirs 0 http://localhost/user1/ 2>/dev/null \
          || echo "000")
        echo "Unauthenticated response code: $response"
        if [ "$response" = "302" ] || [ "$response" = "307" ]; then
          echo "✅ Auth middleware is active (unauthenticated -> redirect)"
        else
          echo "❌ Expected 302/307 redirect but got $response"
          exit 1
        fi

    - name: Test automated OAuth2 login via Dex (user1)
      if: ${{ inputs.dex_test == 'true' }}
      shell: bash
      run: |
        pip install --quiet requests
        python3 workspaces/test/dtaas/ci/scripts/ci_auth_login.py \
          http://localhost user1 http://dex:5556 password

    - name: Show service logs on failure
      if: failure()
      shell: bash
      env:
        COMPOSE_FILE: ${{ inputs.compose_file }}
        USE_ENV_FILE: ${{ inputs.use_env_file }}
        BASIC_TEST: ${{ inputs.basic_test }}
        DEX_TEST: ${{ inputs.dex_test }}
      run: |
        if [ "$USE_ENV_FILE" = "true" ]; then
          ENV_FILE_ARG="--env-file workspaces/test/dtaas/config/.env"
        else
          ENV_FILE_ARG=""
        fi
        if [ "$BASIC_TEST" = "true" ]; then
          WORKSPACE_SERVICE_NAME="workspace"
        else
          WORKSPACE_SERVICE_NAME="user1"
        fi
        echo "TEST FAILED - PRINTING DIAGNOSTICS:"
        echo ""
        echo "========================================"
        echo "|           Services Status            |"
        echo "========================================"
        docker compose -f $COMPOSE_FILE $ENV_FILE_ARG ps
        echo ""
        if [ "$BASIC_TEST" = "false" ]; then
          echo "========================================"
          echo "|             Traefik Logs             |"
          echo "========================================"
          docker compose -f $COMPOSE_FILE $ENV_FILE_ARG \
            logs traefik
          echo ""
        fi
        if [ "$DEX_TEST" = "true" ]; then
          echo "========================================"
          echo "|       Dex Authentication Logs        |"
          echo "========================================"
          docker compose -f $COMPOSE_FILE $ENV_FILE_ARG \
            logs dex
          echo ""
        fi
        echo "========================================"
        echo "|            Workspace Logs            |"
        echo "========================================"
        docker compose -f $COMPOSE_FILE $ENV_FILE_ARG \
          logs $WORKSPACE_SERVICE_NAME

    - name: Cleanup
      if: always()
      shell: bash
      env:
        COMPOSE_FILE: ${{ inputs.compose_file }}
        USE_ENV_FILE: ${{ inputs.use_env_file }}
      run: |
        if [ "$USE_ENV_FILE" = "true" ]; then
          ENV_FILE_ARG="--env-file workspaces/test/dtaas/config/.env"
        else
          ENV_FILE_ARG=""
        fi
        docker compose -f $COMPOSE_FILE $ENV_FILE_ARG down -v
        docker system prune -f
