name: Dockerfile Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: workspaces/Dockerfile.ubuntu.noble.gnome
          failure-threshold: error

      - name: Lint CI certs Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: workspaces/test/dtaas/ci/certs/Dockerfile
          failure-threshold: error

      - name: Lint Docker Compose files
        run: |
          cp ./workspaces/test/dtaas/config/.env.example ./workspaces/test/dtaas/config/.env

          # Validate production compose files (require .env for variable substitution).
          for file in workspaces/test/dtaas/compose.traefik.yml \
                      workspaces/test/dtaas/compose.yml \
                      workspaces/test/dtaas/compose.traefik.secure.yml \
                      workspaces/test/dtaas/compose.traefik.secure.tls.yml; do
            echo "Linting $file"
            docker compose -f "$file" --env-file workspaces/test/dtaas/config/.env \
              config --quiet
          done

          # Validate self-contained CI compose files (no .env needed).
          echo "Linting workspaces/test/dtaas/ci/compose.yml"
          docker compose -f workspaces/test/dtaas/ci/compose.yml config --quiet
          echo "Linting workspaces/test/dtaas/ci/compose.tls.yml"
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml config --quiet
