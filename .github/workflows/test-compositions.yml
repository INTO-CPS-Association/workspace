name: Test All Compose Files

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate Compositions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        compose-file:
          - compose.traefik.yml
          - compose.traefik.secure.yml
          - compose.traefik.secure.tls.yml
          - ci/compose.traefik.secure.yml
          - ci/compose.traefik.secure.tls.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate ${{ matrix.compose-file }} syntax
        run: |
          cp ./workspaces/test/dtaas/config/.env.example ./workspaces/test/dtaas/config/.env
          docker compose -f workspaces/test/dtaas/${{ matrix.compose-file }} \
          --env-file workspaces/test/dtaas/config/.env \
          config --quiet
          echo "✅ ${{ matrix.compose-file }} syntax is valid"

  build-workspace-image:
    name: Build and Cache Workspace Image
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: validate-compose
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and cache workspace image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.gnome
          build-args: INSTALLATION=minimal
          push: false
          platforms: ${{ matrix.arch.platform }}
          cache-from: |
            type=gha,scope=${{ matrix.arch.platform }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.arch.platform }}

  test-minimal-image:
    name: Test base composition with minimal installation image
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.yml
          platform: ${{ matrix.arch.platform }}
          startup_timeout: 30
          basic_test: true

  test-traefik:
    name: Test Traefik with Workspace
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.traefik.yml
          platform: ${{ matrix.arch.platform }}
          no_forward_auth_service: true

  test-traefik-secure:
    name: Test Traefik Secure Setup
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.traefik.secure.yml
          platform: ${{ matrix.arch.platform }}
          connectivity_endpoint: "http://localhost/auth"
          connectivity_expected_response_code: "303"
          startup_timeout: 60
          use_env_file: true
          ignore_health_of_services: "dtaas-traefik-forward-auth-1"

  test-traefik-secure-tls:
    name: Test Traefik with TLS
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.traefik.secure.tls.yml
          platform: ${{ matrix.arch.platform }}
          connectivity_endpoint: "http://localhost/auth"
          connectivity_expected_response_code: "301"
          startup_timeout: 60
          use_env_file: true
          tls_test: true
          ignore_health_of_services: "dtaas-traefik-forward-auth-1"

  test-ci-traefik-secure:
    name: Test CI OAuth2 via Dex (HTTP)
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/ci/compose.traefik.secure.yml
          platform: ${{ matrix.arch.platform }}
          startup_timeout: 180
          dex_test: true

  test-ci-traefik-secure-tls:
    name: Test CI OAuth2 via Dex (TLS)
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/ci/compose.traefik.secure.yml
          platform: ${{ matrix.arch.platform }}
          startup_timeout: 180
          dex_test: true
          tls_test: true
