name: Test All Compose Files

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate Compositions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        compose-file:
          - compose.traefik.yml
          - compose.traefik.secure.yml
          - compose.traefik.secure.tls.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate ${{ matrix.compose-file }} syntax
        run: |
          cp ./workspaces/test/dtaas/config/.env.example ./workspaces/test/dtaas/config/.env
          docker compose -f workspaces/test/dtaas/${{ matrix.compose-file }} --env-file workspaces/test/dtaas/config/.env config > /dev/null
          echo "✅ ${{ matrix.compose-file }} syntax is valid"

  validate-ci-compose:
    name: Validate CI Compose Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate CI compose files syntax
        run: |
          docker compose \
            -f workspaces/test/dtaas/ci/compose.traefik.secure.yml \
            config --quiet
          echo "✅ ci/compose.traefik.secure.yml syntax is valid"
          docker compose \
            -f workspaces/test/dtaas/ci/compose.traefik.secure.tls.yml \
            config --quiet
          echo "✅ ci/compose.traefik.secure.tls.yml syntax is valid"

  build-workspace-image:
    name: Build and Cache Workspace Image
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: [validate-compose, validate-ci-compose]
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and cache workspace image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.gnome
          build-args: INSTALLATION=minimal
          push: false
          platforms: ${{ matrix.arch.platform }}
          cache-from: |
            type=gha,scope=${{ matrix.arch.platform }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.arch.platform }}

  test-minimal-image:
    name: Test base composition with minimal installation image
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.yml
          platform: ${{ matrix.arch.platform }}
          startup_timeout: 30
          basic_test: true

  test-traefik:
    name: Test Traefik with Workspace
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.traefik.yml
          platform: ${{ matrix.arch.platform }}
          no_forward_auth_service: true

  test-traefik-secure:
    name: Test Traefik Secure Setup
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      
      - name: Test composition with minimal image
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/compose.traefik.secure.yml
          platform: ${{ matrix.arch.platform }}
          connectivity_endpoint: "http://localhost/auth"
          connectivity_expected_response_code: "302"
          startup_timeout: 60
          use_env_file: true

  test-traefik-secure-tls:
    name: Test Traefik with TLS
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build workspace image
        # Read-only cache: build-workspace-image already populated the cache.
        # Omitting cache-to avoids write contention between parallel test jobs.
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.gnome
          build-args: INSTALLATION=minimal
          push: false
          load: true
          platforms: ${{ matrix.arch.platform }}
          tags: workspace:latest
          cache-from: |
            type=gha,scope=${{ matrix.arch.platform }}

      - name: Generate self-signed certificates for testing
        run: |
          mkdir -p workspaces/test/dtaas/certs
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout workspaces/test/dtaas/certs/privkey.pem \
            -out workspaces/test/dtaas/certs/fullchain.pem \
            -subj "/C=US/ST=Test/L=Test/O=Test/CN=localhost"
          chmod 644 workspaces/test/dtaas/certs/fullchain.pem
          chmod 600 workspaces/test/dtaas/certs/privkey.pem
          echo "✅ Self-signed certificates generated"

      - name: Verify TLS configuration file
        run: |
          if [ -f workspaces/test/dtaas/dynamic/tls.yml ]; then
            echo "✅ TLS configuration file exists"
            cat workspaces/test/dtaas/dynamic/tls.yml
          else
            echo "❌ TLS configuration file not found"
            exit 1
          fi

      - name: Create DTaaS configuration files
        run: |
          set -e
          cp ./workspaces/test/dtaas/config/.env.example ./workspaces/test/dtaas/config/.env
          sed -i 's/yourdomain.com/localhost/g' ./workspaces/test/dtaas/config/.env
          cp ./workspaces/test/dtaas/config/conf.example ./workspaces/test/dtaas/config/conf
          cp ./workspaces/test/dtaas/config/client.js.example ./workspaces/test/dtaas/config/client.js

      - name: Start Traefik and workspace services
        run: |
          docker compose \
            -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
            --env-file workspaces/test/dtaas/config/.env \
            up -d
          sleep 60

      - name: Check service health
        uses: ./.github/actions/check-service-health
        with:
          compose_file: workspaces/test/dtaas/compose.traefik.secure.tls.yml
          ignore_services: traefik-forward-auth
          use_env_file: true

      - name: Test HTTPS connectivity
        uses: ./.github/actions/check-connectivity
        with:
          url: "https://localhost/auth"
          expected_response_code: "302"

      - name: Test HTTP to HTTPS redirect
        run: |
          echo "Testing HTTP to HTTPS redirect..."
          response=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -L --max-redirs 0 http://localhost/ 2>/dev/null || true)

          if [ "$response" = "301" ] || [ "$response" = "308" ]; then
            echo "✅ HTTP to HTTPS redirect is working (HTTP $response)"
          else
            echo "❌ Unexpected redirect behavior (HTTP $response)"
            echo "Showing verbose curl call:"
            curl -k -v -L http://localhost/
            exit 1
          fi

      - name: Verify TLS certificate is loaded
        run: |
          echo "Checking Traefik logs for TLS certificate loading..."
          docker compose \
            -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
            --env-file workspaces/test/dtaas/config/.env \
            logs traefik \
            | grep -i "certificate" || echo "No certificate messages in logs"

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "TEST FAILED - PRINTING DIAGNOSTICS:"
          echo ""
          echo "========================================"
          echo "|           Services Status            |"
          echo "========================================"
          docker compose -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
                --env-file workspaces/test/dtaas/config/.env \
                ps
          echo ""
          echo "========================================"
          echo "|             Traefik Logs             |"
          echo "========================================"
          docker compose \
            -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
            --env-file workspaces/test/dtaas/config/.env \
            logs traefik
          echo ""
          echo "========================================"
          echo "|      Traefik Forward Auth Logs       |"
          echo "========================================"
          docker compose \
            -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
            --env-file workspaces/test/dtaas/config/.env \
            logs traefik-forward-auth
          echo ""
          echo "========================================"
          echo "|            Workspace Logs            |"
          echo "========================================"
          docker compose -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
            --env-file workspaces/test/dtaas/config/.env \
            logs user1

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f workspaces/test/dtaas/compose.traefik.secure.tls.yml \
            --env-file workspaces/test/dtaas/config/.env \
            down -v
          docker system prune -f
          rm -rf workspaces/test/dtaas/certs/*.pem

  test-ci-traefik-secure:
    name: Test CI OAuth2 via Dex (HTTP)
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/ci/compose.traefik.secure.yml
          platform: ${{ matrix.arch.platform }}
          startup_timeout: 180
          dex_test: true

  test-ci-traefik-secure-tls:
    name: Test CI OAuth2 via Dex (TLS)
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: build-workspace-image
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Test composition
        uses: ./.github/actions/test-composition
        with:
          compose_file: workspaces/test/dtaas/ci/compose.traefik.secure.yml
          platform: ${{ matrix.arch.platform }}
          startup_timeout: 180
          dex_test: true
          tls_test: true
