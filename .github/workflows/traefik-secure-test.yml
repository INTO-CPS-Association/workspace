name: Test Traefik OAuth2 and TLS Configuration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Validate production compose files syntax
        run: |
          cp ./workspaces/test/dtaas/config/.env.example ./workspaces/test/dtaas/config/.env
          for f in compose.traefik.secure.yml compose.traefik.secure.tls.yml; do
            docker compose \
              -f "workspaces/test/dtaas/${f}" \
              --env-file workspaces/test/dtaas/config/.env \
              config > /dev/null
            echo "✅ ${f} syntax is valid"
          done

      - name: Validate CI compose files syntax
        run: |
          docker compose -f workspaces/test/dtaas/ci/compose.yml config > /dev/null
          echo "✅ ci/compose.yml syntax is valid"
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml config > /dev/null
          echo "✅ ci/compose.tls.yml syntax is valid"

  test-traefik-secure:
    name: Test Traefik Secure Setup
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: validate-compose
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build workspace image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.gnome
          push: false
          load: true
          platforms: ${{ matrix.arch.platform }}
          tags: workspace:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull docker images
        run: |
          docker pull traefik:v3.6.4
          docker pull thomseddon/traefik-forward-auth:2.2.0
          docker pull dexidp/dex:v2.41.1
          docker pull mltooling/ml-workspace-minimal:0.13.2

      # Make the Dex Docker service name resolvable from the CI runner host.
      # traefik-forward-auth redirects to http://dex:5556/dex/auth?... and curl
      # (running on the host) must be able to follow that redirect.
      - name: Add Dex hostname to /etc/hosts
        run: echo "127.0.0.1 dex" | sudo tee -a /etc/hosts

      - name: Start services
        run: |
          docker compose -f workspaces/test/dtaas/ci/compose.yml up -d
          echo "⏳ Waiting for services to be ready..."
          sleep 90

      - name: Check service health
        run: |
          echo "📊 Checking service status..."
          docker compose -f workspaces/test/dtaas/ci/compose.yml ps
          echo "---"
          SERVICES=$(docker compose -f workspaces/test/dtaas/ci/compose.yml \
            ps --format json)
          if echo "$SERVICES" | head -1 | grep -q '^\['; then
            FAILED=$(echo "$SERVICES" | jq -r '.[] | select(.State != "running") | .Name')
          else
            FAILED=$(echo "$SERVICES" | jq -r 'select(.State != "running") | .Name')
          fi
          if [ -n "$FAILED" ]; then
            echo "❌ Some services are not running:"
            echo "$FAILED"
            docker compose -f workspaces/test/dtaas/ci/compose.yml logs
            exit 1
          fi
          echo "✅ All services are running"

      # Verify traefik-forward-auth is enforcing auth:
      # unauthenticated requests must be redirected, not served directly.
      - name: Verify auth is enforced (expect redirect, not 200)
        run: |
          echo "Verifying that unauthenticated requests are redirected..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-redirs 0 http://localhost/user1/ 2>/dev/null || echo "000")
          echo "Unauthenticated response code: $response"
          if [ "$response" = "302" ] || [ "$response" = "307" ]; then
            echo "✅ Auth middleware is active (unauthenticated -> redirect)"
          else
            echo "❌ Expected 302/307 redirect but got $response"
            docker compose -f workspaces/test/dtaas/ci/compose.yml \
              logs traefik traefik-forward-auth dex
            exit 1
          fi

      # Full automated OAuth2 login flow via Dex → traefik-forward-auth.
      - name: Test automated OAuth2 login via Dex (user1)
        run: |
          chmod +x workspaces/test/dtaas/ci/scripts/ci_auth_login.sh
          workspaces/test/dtaas/ci/scripts/ci_auth_login.sh \
            http://localhost user1 http://dex:5556 password

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== Traefik Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.yml logs traefik
          echo "=== Traefik Forward Auth Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.yml logs traefik-forward-auth
          echo "=== Dex Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.yml logs dex

      - name: Cleanup
        if: always()
        run: |
          docker compose -f workspaces/test/dtaas/ci/compose.yml down -v
          docker system prune -f


  test-traefik-secure-tls:
    name: Test Traefik with TLS
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    needs: validate-compose
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435  # v3.11.1

      - name: Build workspace image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: ./workspaces
          file: workspaces/Dockerfile.ubuntu.noble.gnome
          push: false
          load: true
          platforms: ${{ matrix.arch.platform }}
          tags: workspace:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install mkcert and generate TLS certificates
        run: |
          set -e
          # Install mkcert (version-pinned, architecture-aware)
          ARCH=$(uname -m)
          case "${ARCH}" in
            x86_64)  MKCERT_ARCH="linux-amd64" ;;
            aarch64) MKCERT_ARCH="linux-arm64" ;;
            *)        echo "Unsupported architecture: ${ARCH}"; exit 1 ;;
          esac
          MKCERT_VERSION="v1.4.4"
          curl -fsSL \
            "https://github.com/FiloSottile/mkcert/releases/download/${MKCERT_VERSION}/mkcert-${MKCERT_VERSION}-${MKCERT_ARCH}" \
            -o /tmp/mkcert
          chmod +x /tmp/mkcert
          sudo mv /tmp/mkcert /usr/local/bin/mkcert

          # Install the mkcert root CA into the system trust store
          mkcert -install

          # Generate certificate for localhost.
          # ci/compose.tls.yml mounts ci/certs/ as /etc/traefik-certs and
          # ci/dynamic/tls.yml references fullchain.pem / privkey.pem.
          mkcert \
            -cert-file workspaces/test/dtaas/ci/certs/fullchain.pem \
            -key-file  workspaces/test/dtaas/ci/certs/privkey.pem \
            localhost 127.0.0.1 ::1
          chmod 644 workspaces/test/dtaas/ci/certs/fullchain.pem
          chmod 600 workspaces/test/dtaas/ci/certs/privkey.pem
          echo "TLS certificates generated"

          # Copy root CA for the traefik-forward-auth-local Docker build
          CAROOT=$(mkcert -CAROOT)
          cp "${CAROOT}/rootCA.pem" workspaces/test/dtaas/ci/certs/rootCA.crt

          # Build traefik-forward-auth-local (embeds the local root CA)
          docker build \
            -t traefik-forward-auth-local:latest \
            workspaces/test/dtaas/ci/certs/
          echo "traefik-forward-auth-local image built"

      - name: Pull docker images
        run: |
          docker pull traefik:v3.6.4
          docker pull thomseddon/traefik-forward-auth:fix-dont-require-self-middleware-test1
          docker pull dexidp/dex:v2.41.1
          docker pull mltooling/ml-workspace-minimal:0.13.2

      # Make the Dex Docker service name resolvable from the CI runner host.
      # traefik-forward-auth redirects to http://dex:5556/dex/auth?... and
      # Python requests (running on the host) must be able to follow it.
      - name: Add Dex hostname to /etc/hosts
        run: echo "127.0.0.1 dex" | sudo tee -a /etc/hosts

      - name: Start services (TLS)
        run: |
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml up -d
          echo "Waiting for services to be ready..."
          sleep 180

      - name: Check service health (TLS)
        run: |
          echo "Checking service status..."
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml ps
          echo "---"
          SERVICES=$(docker compose -f workspaces/test/dtaas/ci/compose.tls.yml \
            ps --format json)
          if echo "$SERVICES" | head -1 | grep -q '^\['; then
            FAILED=$(echo "$SERVICES" | jq -r '.[] | select(.State != "running") | .Name')
          else
            FAILED=$(echo "$SERVICES" | jq -r 'select(.State != "running") | .Name')
          fi
          if [ -n "$FAILED" ]; then
            echo "Some services are not running:"
            echo "$FAILED"
            docker compose -f workspaces/test/dtaas/ci/compose.tls.yml logs
            exit 1
          fi
          echo "All services are running"

      # Verify traefik-forward-auth is enforcing auth over HTTPS.
      - name: Verify auth is enforced (expect redirect, not 200)
        run: |
          echo "Verifying that unauthenticated requests are redirected..."
          CAROOT=$(mkcert -CAROOT)
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --cacert "${CAROOT}/rootCA.pem" \
            --max-redirs 0 https://localhost/user1/ 2>/dev/null || echo "000")
          echo "Unauthenticated response code: $response"
          if [ "$response" = "302" ] || [ "$response" = "307" ]; then
            echo "Auth middleware is active (unauthenticated -> redirect)"
          else
            echo "Expected 302/307 redirect but got $response"
            docker compose -f workspaces/test/dtaas/ci/compose.tls.yml \
              logs traefik traefik-forward-auth dex
            exit 1
          fi

      # Full automated OAuth2 login flow over HTTPS via Dex -> traefik-forward-auth.
      - name: Test automated OAuth2 login via Dex (user1, TLS)
        run: |
          pip install --quiet requests
          CAROOT=$(mkcert -CAROOT)
          python3 workspaces/test/dtaas/ci/scripts/ci_auth_login.py \
            https://localhost user1 http://dex:5556 password \
            --ca-bundle "${CAROOT}/rootCA.pem"

      - name: Test HTTP to HTTPS redirect
        run: |
          echo "Testing HTTP to HTTPS redirect..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-redirs 0 http://localhost/ 2>/dev/null || echo "000")
          if [ "$response" = "301" ] || [ "$response" = "308" ]; then
            echo "HTTP to HTTPS redirect is working (HTTP $response)"
          else
            echo "Unexpected redirect behavior (HTTP $response)"
            echo "This might be expected if Traefik is still initializing"
          fi

      - name: Verify TLS certificate is loaded
        run: |
          echo "Checking Traefik logs for TLS certificate loading..."
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml logs traefik \
            | grep -i "certificate" || echo "No certificate messages in logs"

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== Traefik Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml logs traefik
          echo "=== Traefik Forward Auth Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml logs traefik-forward-auth
          echo "=== Dex Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml logs dex
          echo "=== User1 Logs ==="
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml logs user1 | tail -50

      - name: Cleanup (TLS)
        if: always()
        run: |
          docker compose -f workspaces/test/dtaas/ci/compose.tls.yml down -v
          docker system prune -f
          rm -f workspaces/test/dtaas/ci/certs/fullchain.pem \
                workspaces/test/dtaas/ci/certs/privkey.pem \
                workspaces/test/dtaas/ci/certs/rootCA.crt
